# Ping hebdomadaire du projet Supabase pour éviter la mise en veille du
# tier gratuit. Nécessite les secrets SUPABASE_PING_URL et SUPABASE_ANON_KEY
# (voir docs/SYNC.md). Sans secrets, le job se termine sans rien faire.
name: keepalive
on:
  schedule:
    - cron: "17 6 * * 1,4"   # lundi et jeudi, 06h17 UTC
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping supabase
        env:
          URL: ${{ secrets.SUPABASE_PING_URL }}
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$URL" ]; then echo "pas de secret, rien à faire"; exit 0; fi
          curl -sf -H "apikey: $KEY" -H "Authorization: Bearer $KEY" "$URL" > /dev/null
          echo "ping ok"
